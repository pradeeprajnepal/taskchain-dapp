<!DOCTYPE html>
<html>

<head>
    <title>TaskChain DApp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: auto;
            padding: 20px;
            background: #f5f6fa;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px;
            margin-top: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .mission {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid #4CAF50;
        }

        .priority-low {
            border-left-color: green;
        }

        .priority-medium {
            border-left-color: orange;
        }

        .priority-high {
            border-left-color: red;
        }

        .status {
            margin-top: 5px;
            font-size: 13px;
        }

        .done {
            color: green;
            font-weight: bold;
        }

        .pending {
            color: orange;
        }
    </style>
</head>

<body>

    <h1>🚀 TaskChain DApp</h1>

    <div class="card">
        <input id="taskInput" placeholder="Enter mission..." />

        <select id="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button onclick="createMission()">Add Mission</button>
    </div>

    <h2>📋 Missions</h2>
    <div id="missions"></div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>

    <script>
        let contract;
        let contractAddress = "0x057E2b7675bed80Ff29Bb44F6297cA5a96A68280";

        const abi = [
            "function createMission(string,string)",
            "function completeMission(uint256)",
            "function missionCount() view returns (uint)",
            "function missions(uint256) view returns (uint,string,string,bool,address)"
        ];

        async function connect() {
            if (!window.ethereum) {
                alert("MetaMask not found");
                return;
            }

            try {
                await window.ethereum.request({
                    method: "wallet_switchEthereumChain",
                    params: [{ chainId: "0xaa36a7" }]
                });
            } catch (err) { }

            await window.ethereum.request({ method: "eth_requestAccounts" });

            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();

            contract = new ethers.Contract(contractAddress, abi, signer);
        }

        async function createMission() {
            try {
                await connect();

                const task = document.getElementById("taskInput").value;
                const priority = document.getElementById("priority").value;

                const tx = await contract.createMission(task, priority);
                await tx.wait();

                await new Promise(res => setTimeout(res, 1500));

                await loadMissions();

            } catch (err) {
                console.error(err);
                alert("Transaction failed");
            }
        }

        async function completeMission(id) {
            try {
                const tx = await contract.completeMission(id);
                await tx.wait();

                await loadMissions();

            } catch (err) {
                console.error(err);
                alert("Failed to complete mission");
            }
        }

        async function loadMissions() {
            try {
                const container = document.getElementById("missions");
                container.innerHTML = "";

                const count = Number(await contract.missionCount());

                for (let i = 0; i < count; i++) {
                    const m = await contract.missions(i);

                    if (m[3]) continue; // hide completed

                    const div = document.createElement("div");
                    div.className = `mission priority-${m[2].toLowerCase()}`;

                    div.innerHTML = `
                        <b>${m[1]}</b>
                        <div>Priority: ${m[2]}</div>

                        <div class="status pending">🟡 Pending</div>

                        <button onclick="completeMission(${i})">
                            Mark Completed
                        </button>
                    `;

                    container.appendChild(div);
                }

            } catch (err) {
                console.error("Load failed:", err);
            }
        }

        window.onload = async () => {
            await connect();
            await loadMissions();
        };
    </script>

</body>

</html>
